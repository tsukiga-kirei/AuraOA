<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 盾牌主体 -->
  <path d="M256 42 L440 120 C440 120 448 280 380 380 C330 452 256 482 256 482 C256 482 182 452 132 380 C64 280 72 120 72 120 Z"
        fill="url(#shieldGrad)" stroke="#4338ca" stroke-width="4"/>

  <!-- 盾牌内部高光 -->
  <path d="M256 72 L412 138 C412 138 418 274 360 362 C318 424 256 450 256 450 C256 450 194 424 152 362 C94 274 100 138 100 138 Z"
        fill="url(#innerGrad)"/>

  <!-- AI 脑回路装饰线（左侧） -->
  <circle cx="190" cy="220" r="8" fill="#a5b4fc" opacity="0.6"/>
  <circle cx="170" cy="280" r="6" fill="#a5b4fc" opacity="0.4"/>
  <circle cx="200" cy="340" r="5" fill="#a5b4fc" opacity="0.3"/>
  <line x1="190" y1="228" x2="170" y2="274" stroke="#a5b4fc" stroke-width="2" opacity="0.4"/>
  <line x1="170" y1="286" x2="200" y2="335" stroke="#a5b4fc" stroke-width="2" opacity="0.3"/>

  <!-- AI 脑回路装饰线（右侧） -->
  <circle cx="322" cy="220" r="8" fill="#a5b4fc" opacity="0.6"/>
  <circle cx="342" cy="280" r="6" fill="#a5b4fc" opacity="0.4"/>
  <circle cx="312" cy="340" r="5" fill="#a5b4fc" opacity="0.3"/>
  <line x1="322" y1="228" x2="342" y2="274" stroke="#a5b4fc" stroke-width="2" opacity="0.4"/>
  <line x1="342" y1="286" x2="312" y2="335" stroke="#a5b4fc" stroke-width="2" opacity="0.3"/>

  <!-- 中央勾选符号 -->
  <g filter="url(#glow)">
    <path d="M210 270 L248 312 L318 228"
          stroke="url(#checkGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- 顶部 AI 光点 -->
  <circle cx="256" cy="155" r="12" fill="#c7d2fe" opacity="0.8"/>
  <circle cx="256" cy="155" r="6" fill="#ffffff" opacity="0.9"/>
</svg>
